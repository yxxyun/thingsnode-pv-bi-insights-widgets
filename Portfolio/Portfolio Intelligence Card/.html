<div class="portfolio-card">
    <div class="card-header">
        <div class="card-title js-title"></div>
    </div>

    <div class="card-content">
        <div class="value-row">
            <span class="main-value skeleton js-value">--</span>
            <span class="unit js-unit"></span>
        </div>

        <div class="sub-content">
            <!-- Standard mode: delta indicator -->
            <div class="delta-container js-delta">
                <span class="delta-arrow js-delta-arrow">▲</span>
                <span class="delta-value js-delta-value">--%</span>
                <span class="delta-label js-delta-label"></span>
            </div>

            <!-- Risk mode: exposure label -->
            <div class="exposure-container js-exposure">
                <span class="exposure-icon">⚠️</span>
                <span class="exposure-text js-exposure-text"></span>
            </div>

            <!-- Diversity mode: bar -->
            <div class="diversity-container js-diversity">
                <div class="bar-bg">
                    <div class="bar-fill js-bar-fill">
                        <span class="bar-text js-bar-text">--</span>
                    </div>
                </div>
                <div class="optimal-range">
                    <span class="check-icon">✔</span>
                    <span class="range-text js-range-text"></span>
                </div>
            </div>
        </div>
    </div>

    <div class="tooltip-container">
        <div class="tooltip-text js-tooltip"></div>
    </div>
</div>
