<div class="dayi-card">

    <!-- ═══ HEADER ═══ -->
    <div class="card-header">
        <div class="card-title js-title">DEGRADATION ADJUSTED YIELD INDEX</div>
        <div class="header-status">
            <span class="status-dot js-status-dot"></span>
            <span class="status-text js-status-text">--</span>
        </div>
    </div>

    <!-- ═══ BODY — Chart ═══ -->
    <div class="card-body">
        <canvas class="js-canvas"></canvas>
    </div>

    <!-- ═══ FOOTER — Key Metrics ═══ -->
    <div class="card-footer">
        <div class="footer-metric">
            <span class="metric-label">CURRENT</span>
            <span class="metric-val js-current-val skeleton">--%</span>
        </div>
        <div class="footer-sep"></div>
        <div class="footer-metric">
            <span class="metric-label">CHANGE</span>
            <span class="metric-val js-change-val skeleton">--</span>
        </div>
        <div class="footer-sep"></div>
        <div class="footer-metric">
            <span class="metric-label">LOW</span>
            <span class="metric-val js-min-val skeleton">--%</span>
        </div>
    </div>

    <!-- ═══ TOOLTIP — Glassmorphism ═══ -->
    <div class="tooltip-container">
        <div class="tooltip-content js-tooltip"></div>
    </div>

</div>
