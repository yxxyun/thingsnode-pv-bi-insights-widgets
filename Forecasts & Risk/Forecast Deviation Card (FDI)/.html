<div class="fdi-card">

    <!-- ═══ HEADER ═══ -->
    <div class="card-header">
        <div class="card-title js-title">FDI vs P50 (%)</div>
        <div class="header-right">
            <span class="status-dot js-status-dot"></span>
            <span class="status-text js-status-text">--</span>
            <span class="resolution-label js-resolution">PLANT</span>
        </div>
    </div>

    <!-- ═══ BODY ═══ -->
    <div class="card-body">

        <!-- Left: Big Deviation Value -->
        <div class="value-block">
            <div class="dev-value js-value skeleton">--%</div>
            <div class="dev-label">Deviation</div>
        </div>

        <!-- Separator -->
        <div class="body-sep"></div>

        <!-- Right: Context Values -->
        <div class="ctx-block">
            <div class="ctx-row">
                <span class="ctx-label">Forecast</span>
                <span class="ctx-val js-ctx-forecast">--</span>
            </div>
            <div class="ctx-row">
                <span class="ctx-label">Actual</span>
                <span class="ctx-val js-ctx-actual">--</span>
            </div>
        </div>

    </div>

    <!-- ═══ FOOTER ═══ -->
    <div class="card-footer">
        <span class="footer-text js-footer-text">Deviation from Median Expectation</span>
    </div>

    <!-- ═══ TOOLTIP — Glassmorphism ═══ -->
    <div class="tooltip-container">
        <div class="tooltip-content js-tooltip"></div>
    </div>

</div>
