<div class="rar-card">

    <!-- ═══ HEADER ═══ -->
    <div class="card-header">
        <div class="card-title js-title">Revenue-at-Risk Breakdown</div>
        <div class="header-right">
            <span class="resolution-label js-resolution">PORTFOLIO</span>
        </div>
    </div>

    <!-- ═══ BODY ═══ -->
    <div class="card-body">
        <div class="bar-container">
            <div class="stacked-bar-track js-bar-track">
                <!-- Segments injected by JS -->
            </div>
            <div class="bar-ticks">
                <span class="bar-tick" style="left:25%">25%</span>
                <span class="bar-tick" style="left:50%">50%</span>
                <span class="bar-tick" style="left:75%">75%</span>
            </div>
        </div>

        <div class="total-row">
            <span class="total-label">Total Revenue at Risk:</span>
            <span class="total-val skeleton js-total-val">--</span>
        </div>
    </div>

    <!-- ═══ FOOTER ═══ -->
    <div class="card-footer">
        <span class="footer-label"><span class="js-time-horizon">Annual Forecast</span> · <span class="js-footer-text">Potential Revenue Impact · All Categories</span></span>
    </div>

    <!-- ═══ TOOLTIP — Glassmorphism ═══ -->
    <div class="tooltip-container">
        <div class="tooltip-content js-tooltip"></div>
    </div>

</div>
