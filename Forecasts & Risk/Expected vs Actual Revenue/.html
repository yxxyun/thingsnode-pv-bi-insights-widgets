<div class="rev-card">

    <!-- ═══ HEADER ═══ -->
    <div class="card-header">
        <div class="card-title js-title">EXPECTED vs. ACTUAL REVENUE</div>
        <div class="header-status">
            <span class="status-dot js-status-dot"></span>
            <span class="status-text js-status-text">--</span>
        </div>
    </div>

    <!-- ═══ BODY — Bar Chart ═══ -->
    <div class="chart-body">
        <div class="y-axis-title js-y-title">Revenue</div>
        <div class="chart-area">
            <div class="grid-lines">
                <div class="grid-line"><span class="grid-label js-grid-max">--</span></div>
                <div class="grid-line"><span class="grid-label js-grid-mid">--</span></div>
                <div class="grid-line grid-zero"><span class="grid-label">0</span></div>
            </div>
            <div class="bars-container js-bars"></div>
        </div>
    </div>

    <!-- ═══ FOOTER — Legend ═══ -->
    <div class="card-footer">
        <div class="legend-item">
            <span class="legend-dot js-dot-a"></span>
            <span class="legend-label js-legend-a">Expected</span>
        </div>
        <div class="legend-item">
            <span class="legend-dot js-dot-b"></span>
            <span class="legend-label js-legend-b">Actual</span>
        </div>
    </div>

    <!-- ═══ TOOLTIP — Glassmorphism ═══ -->
    <div class="tooltip-container">
        <div class="tooltip-content js-tooltip"></div>
    </div>

</div>
