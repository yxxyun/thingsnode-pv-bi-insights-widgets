<div class="cf-card">

    <div class="card-header">
        <div class="card-title js-title">CAPACITY FACTOR COMPLIANCE</div>
    </div>

    <div class="gauge-section">
        <svg class="gauge-svg js-gauge-svg" viewBox="-10 -5 220 125">
            <path class="gauge-bg" d="M 20 100 A 80 80 0 0 1 180 100" />
            <path class="gauge-fill js-gauge-fill" d="M 20 100 A 80 80 0 0 1 180 100" stroke-dasharray="0, 251" />
            <polygon class="gauge-needle js-needle" points="100,48 97,51 100,26 103,51" />
            <text x="8" y="117" class="gauge-tick">0%</text>
            <text x="192" y="117" class="gauge-tick" text-anchor="end">100%</text>
        </svg>
        <div class="gauge-overlay">
            <div class="gauge-val js-gauge-val skeleton">--%</div>
            <div class="gauge-sub">Actual CF</div>
            <div class="target-pill js-target-pill">TARGET: --%</div>
        </div>
    </div>

    <!-- ═══ MIDDLE — RISK BANNER ═══ -->
    <div class="risk-banner js-risk-banner">
        <span class="risk-dot js-risk-dot"></span>
        <span class="risk-text js-risk-text">--</span>
    </div>

    <!-- ═══ BOTTOM HALF — PERFORMANCE BARS ═══ -->
    <div class="perf-section">
        <div class="perf-title js-perf-title">Contractual Performance</div>
        <div class="bars-row">
            <div class="bar-col">
                <span class="bar-val">100%</span>
                <div class="bar-track">
                    <div class="bar-fill bar-target-fill"></div>
                </div>
                <span class="bar-lbl">Target</span>
            </div>
            <div class="bar-col">
                <span class="bar-val js-bar-val">--%</span>
                <div class="bar-track">
                    <div class="bar-fill js-bar-fill"></div>
                </div>
                <span class="bar-lbl">Actual</span>
            </div>
        </div>
    </div>

    <!-- ═══ TOOLTIP — Glassmorphism ═══ -->
    <div class="tooltip-container">
        <div class="tooltip-content js-tooltip"></div>
    </div>

</div>
