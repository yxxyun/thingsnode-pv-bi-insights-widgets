<div class="claims-card">

    <!-- ═══ HEADER ═══ -->
    <div class="card-header">
        <div class="card-title js-title">INSURANCE CLAIMABLE EVENTS SUMMARY</div>
        <div class="header-right">
            <span class="status-dot js-status-dot"></span>
            <span class="status-text js-status-text">--</span>
        </div>
    </div>

    <!-- ═══ SUMMARY STATS ═══ -->
    <div class="summary-row">
        <div class="stat-item">
            <span class="stat-label">Total Claims</span>
            <span class="stat-value js-stat-count">--</span>
        </div>
        <div class="stat-sep"></div>
        <div class="stat-item">
            <span class="stat-label">Approved</span>
            <span class="stat-value stat-good js-stat-approved">--</span>
        </div>
        <div class="stat-sep"></div>
        <div class="stat-item">
            <span class="stat-label">Pending</span>
            <span class="stat-value stat-warn js-stat-pending">--</span>
        </div>
        <div class="stat-sep"></div>
        <div class="stat-item">
            <span class="stat-label">Rejected</span>
            <span class="stat-value stat-bad js-stat-rejected">--</span>
        </div>
    </div>

    <!-- ═══ TABLE HEADER ═══ -->
    <div class="table-header">
        <div class="col col-date">Date</div>
        <div class="col col-event">Event Type</div>
        <div class="col col-lost">Energy Lost</div>
        <div class="col col-amount">Claimable</div>
        <div class="col col-status">Status</div>
    </div>

    <!-- ═══ TABLE BODY ═══ -->
    <div class="table-body js-list"></div>

    <!-- ═══ FOOTER ═══ -->
    <div class="card-footer">
        <span class="footer-label">Total Claimable:</span>
        <span class="footer-value js-total">--</span>
    </div>

    <!-- ═══ TOOLTIP — Glassmorphism ═══ -->
    <div class="tooltip-container">
        <div class="tooltip-content js-tooltip"></div>
    </div>

</div>
