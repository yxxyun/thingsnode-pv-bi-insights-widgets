<div class="pv-curtailment-widget">
    <div class="curt-card">
        <!-- Header -->
        <div class="card-header">
            <div class="card-title js-title">CURTAILMENT VS POTENTIAL POWER</div>
            <div class="header-status">
                <span class="status-dot js-status-dot nodata"></span>
                <span class="status-text js-status-text">NO DATA</span>
            </div>
        </div>

        <!-- Chart Area -->
        <div class="chart-body">
            <div class="y-axis-title js-y-title">POWER (kW)</div>
            <div class="chart-container">
                <canvas class="js-canvas"></canvas>
            </div>
        </div>

        <!-- Footer Legend -->
        <div class="card-footer">
            <div class="legend-item">
                <div class="legend-line dashed"></div>
                <div class="legend-label js-legend-potential">Potential Power</div>
            </div>
            <div class="legend-item">
                <div class="legend-line solid"></div>
                <div class="legend-label js-legend-exported">Exported Power</div>
            </div>
            <div class="legend-item">
                <div class="legend-block curtailed"></div>
                <div class="legend-label js-legend-curtailed">Curtailed Energy</div>
            </div>
        </div>

        <!-- Tooltip Overlay -->
        <div class="tooltip-container js-tooltip-container">
            <div class="tooltip-content js-tooltip">Hover over the chart to see details</div>
        </div>
    </div>
</div>
