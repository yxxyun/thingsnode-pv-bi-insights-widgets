<div class="curtailment-card">
    <div class="card-header">
      <div class="card-title" id="title"></div>
    </div>
  
    <svg id="chart" viewBox="0 0 1000 400" preserveAspectRatio="none"></svg>
  
    <div class="custom-tooltip" id="tooltip">
      <div class="tooltip-line"><b>Time:</b> <span id="tt-time"></span></div>
      <div class="tooltip-line">Potential: <span id="tt-pot"></span> kW</div>
      <div class="tooltip-line">Exported: <span id="tt-exp"></span> kW</div>
      <div class="tooltip-line">Curtailed: <span id="tt-cur"></span> kW</div>
      <div class="tooltip-line"><b>Cumulative loss:</b> <span id="tt-ene"></span> kWh</div>
    </div>
  </div>
