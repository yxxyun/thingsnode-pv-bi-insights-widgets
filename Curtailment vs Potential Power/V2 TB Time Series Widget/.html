<div class="curtailment-card">
    <div class="chart-header">
        <div class="chart-title" id="chart-title">Curtailment vs Potential Power</div>
    </div>
    
    <div class="chart-container">
        <canvas id="powerChart"></canvas>
    </div>

    <div class="custom-legend">
        <div class="legend-item">
            <div class="dot pot"></div>
            <span>Potential Power</span>
        </div>
        <div class="legend-item">
            <div class="dot act"></div>
            <span>Exported Power</span>
        </div>
        <div class="legend-item">
            <div class="dot curt"></div>
            <span>Curtailed Energy</span>
        </div>
    </div>
</div>
