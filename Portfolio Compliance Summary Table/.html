<div class="compliance-card">
    <div class="table-header">
        <div class="table-title" id="table-title"></div>
    </div>
    
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th style="width: 30%">Site Name</th>
                    <th class="col-center" style="width: 15%">Capacity</th>
                    <th class="col-center" style="width: 15%">CF Status</th>
                    <th class="col-right" style="width: 20%">Rev-at-Risk</th>
                    <th class="col-right" style="width: 20%">Compliance</th>
                </tr>
            </thead>
            <tbody id="compliance-body">
                </tbody>
        </table>
    </div>

    <div class="table-footer">
        <div>Total Capacity: <span id="total-cap" class="footer-val">--</span></div>
        <div>Total RaR: <span id="total-rar" class="footer-val">--</span></div>
        <div>Overall Status: <span id="overall-status" class="footer-val footer-status">--</span></div>
    </div>
</div>
