<div class="map-card">
    <div class="map-header">
        <div class="map-title js-title"></div>
        <div class="map-stats js-stats"></div>
    </div>

    <div class="map-container js-map-canvas"></div>

    <div class="map-legends">
        <div class="legend-box">
            <span class="legend-label">Capacity:</span>
            <div class="legend-item">
                <div class="dot size-l"></div> Large
            </div>
            <div class="legend-item">
                <div class="dot size-m"></div> Med
            </div>
            <div class="legend-item">
                <div class="dot size-s"></div> Small
            </div>
        </div>

        <div class="legend-box">
            <span class="legend-label">Status:</span>
            <div class="legend-item">
                <div class="dot color-ok"></div> Healthy
            </div>
            <div class="legend-item">
                <div class="dot color-warn"></div> Warning
            </div>
            <div class="legend-item">
                <div class="dot color-fault"></div> Fault
            </div>
        </div>
    </div>
</div>
